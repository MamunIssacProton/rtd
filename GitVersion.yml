# ─────────────────────────────────────────────────────────────────────────────
# GitVersion 5.x configuration
# https://gitversion.net/docs/reference/configuration
#
# Mode: Mainline
#   Every commit on a tracked branch is a potential release version.
#   The Patch counter increments per commit since the last matching git tag.
#
# Branch strategy
#   dev          → pre-release tag "ci"   (used to form dev-v2026.04.N-ci.DATE.RUN)
#   main         → no pre-release tag     (used to form v2026.04.N)
#   release/**   → no pre-release tag     (used to form v2026.04.N)
#
# The tag-prefix is overridden per-pipeline via overrideConfig so that
# dev tags (dev-v*) and release tags (v*) maintain isolated Patch counters.
# ─────────────────────────────────────────────────────────────────────────────

mode: Mainline
next-version: 0.1.0

major-version-bump-message: '\+semver:\s?(breaking|major)'
minor-version-bump-message: '\+semver:\s?(feature|minor)'
patch-version-bump-message: '\+semver:\s?(fix|patch)'
no-bump-message: '\+semver:\s?(none|skip)'

branches:
  dev:
    regex: ^dev$
    tag: ci
    increment: Patch
    prevent-increment-of-merged-branch-version: false
    is-release-branch: false
    source-branches: ['main', 'release']

  main:
    regex: ^(main|master)$
    tag: ''
    increment: Patch
    is-release-branch: true
    source-branches: []

  release:
    regex: ^release/.*$
    tag: ''
    increment: Patch
    is-release-branch: true
    source-branches: ['main']
