# ─────────────────────────────────────────────────────────────────────────────
# GitVersion configuration
# https://gitversion.net/docs/reference/configuration
#
# Mode: Mainline
#   Every commit on a tracked branch is a potential release version.
#   The Patch counter increments per commit since the last matching git tag.
#
# Branch strategy
#   dev          → pre-release label "ci"   (dev-v2026.04.N-ci.DATE.RUN)
#   main         → no pre-release label     (v2026.04.N)
#   release/**   → no pre-release label     (v2026.04.N)
#
# The tag-prefix is overridden per-pipeline call via /overrideconfig so that
# dev tags (dev-v*) and release tags (v*) never share the same counter.
# ─────────────────────────────────────────────────────────────────────────────

assembly-versioning-scheme: MajorMinorPatch
mode: Mainline
next-version: 0.1.0

major-version-bump-message: '\+semver:\s?(breaking|major)'
minor-version-bump-message: '\+semver:\s?(feature|minor)'
patch-version-bump-message: '\+semver:\s?(fix|patch)'
no-bump-message: '\+semver:\s?(none|skip)'
commit-message-incrementing: Enabled

branches:
  dev:
    label: ci
    increment: Patch
    regex: ^dev$
    track-merge-target: false

  main:
    label: ''
    increment: Patch
    regex: ^(main|master)$
    is-release-branch: true
    track-merge-target: false

  release:
    label: ''
    increment: Patch
    regex: ^release/.*$
    is-release-branch: true
    track-merge-target: false
