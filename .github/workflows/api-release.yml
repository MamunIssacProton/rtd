# ═══════════════════════════════════════════════════════════════════════════════
# API — Release Pipeline
#
# Triggered manually via Actions → Run workflow.
# Versioning is branch-scoped — tags use the "v" prefix and are completely
# independent from dev tags.
#
# Tag format:  v{YYYY.MM}.{N}
# Example:     v2026.04.1
#
# Counter N resets every calendar month and only counts "v" tags (no dev-v),
# so frequent dev builds never pollute the release version counter.
#
# Flow:  build → Test (dev-v image + git tag) → [approval] QA (re-tag dev-v→rc-v, deploy) + rc-v git tag
#        → [approval] Live (re-tag rc-v→v, deploy) + v git tag
#
# GitHub secrets required:
#   DOCKER_HUB_USERNAME   Docker Hub username
#   DOCKER_HUB_TOKEN      Docker Hub access token
#
# GitHub variables required:
#   DOCKER_HUB_REPOSITORY  full repo slug  (e.g. myorg/right-to-drive-api)
#
# GitHub environments required (repo → Settings → Environments):
#   test  — no approval gates  (auto-deploy)
#   qa    — required reviewers → approval gate
#   live  — required reviewers → approval gate
# ═══════════════════════════════════════════════════════════════════════════════
name: API — Release

on:
  workflow_dispatch:

# ═══════════════════════════════════════════════════════════════════════════════
jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # 1. Compile TypeScript
  # ─────────────────────────────────────────────────────────────────────────────
  npm-build:
    name: NPM Build
    uses: ./.github/workflows/tmpl-npm-build.yml
    with:
      node-version: '22'
      working-directory: .

  # ─────────────────────────────────────────────────────────────────────────────
  # 2. Unit tests  ┐
  # 3. Coverage    ┘  parallel — both must pass before version is generated
  # ─────────────────────────────────────────────────────────────────────────────
  npm-test:
    name: NPM Test
    needs: npm-build
    uses: ./.github/workflows/tmpl-npm-test.yml
    with:
      node-version: '22'
      working-directory: .

  npm-coverage:
    name: NPM Coverage
    needs: npm-build
    uses: ./.github/workflows/tmpl-npm-coverage.yml
    with:
      node-version: '22'
      working-directory: .
      coverage-artifact-name: coverage-release-${{ github.run_number }}

  # ─────────────────────────────────────────────────────────────────────────────
  # 4. Test track (dev-v) — version, image, deploy — runs before QA
  # ─────────────────────────────────────────────────────────────────────────────
  generate-test-version:
    name: Generate Test Version (dev-v)
    needs: [npm-test, npm-coverage]
    uses: ./.github/workflows/tmpl-versioning.yml
    with:
      tag-prefix: 'dev-v'
      include-ci-suffix: false

  # ─────────────────────────────────────────────────────────────────────────────
  # 4a. Docker build + push — Test image (dev-v tag from generate-test-version)
  # ─────────────────────────────────────────────────────────────────────────────
  docker-build-push-test:
    name: Docker Build & Push (Test / dev-v)
    needs: generate-test-version
    uses: ./.github/workflows/tmpl-docker-build-push.yml
    with:
      node-version: '22'
      docker-tag: ${{ needs.generate-test-version.outputs.version }}
      docker-repository: ${{ vars.DOCKER_HUB_REPOSITORY }}
      dockerfile-path: Dockerfile
      context-path: .
    secrets:
      docker-username: ${{ secrets.DOCKER_HUB_USERNAME }}
      docker-password: ${{ secrets.DOCKER_HUB_TOKEN }}

  # ─────────────────────────────────────────────────────────────────────────────
  # 4b. Deploy to Test (auto) — before QA
  # ─────────────────────────────────────────────────────────────────────────────
  deploy-test:
    name: Deploy → Test (auto)
    needs: [generate-test-version, docker-build-push-test]
    runs-on: ubuntu-latest
    environment: test
    steps:
      - name: Deploy to Test environment
        run: |
          VERSION="${{ needs.generate-test-version.outputs.version }}"
          IMAGE="${{ vars.DOCKER_HUB_REPOSITORY }}:${VERSION}"
          echo "::notice title=Deploying to Test::${IMAGE}"
          # ── Replace with your actual deployment commands ──
          echo "Deployed ${IMAGE} to Test ✓"

  # ─────────────────────────────────────────────────────────────────────────────
  # 4c. Git tag (dev-v) — only after Test deploy succeeds (same idea as dev pipeline)
  # ─────────────────────────────────────────────────────────────────────────────
  tag-test:
    name: Tag Test Build (dev-v)
    needs: [generate-test-version, deploy-test]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create and push Test git tag (dev-v)
        run: |
          VERSION="${{ needs.generate-test-version.outputs.version }}"
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "${VERSION}" -m "Test ${VERSION}"
          git push origin "${VERSION}"
          echo "::notice title=Test Git Tag::${VERSION}"

  # ─────────────────────────────────────────────────────────────────────────────
  # 5. Generate QA-scoped version — after Test git tag; counts rc-v* tags only
  # ─────────────────────────────────────────────────────────────────────────────
  generate-qa-version:
    name: Generate QA Version (rc-v)
    needs: [npm-test, npm-coverage, tag-test]
    uses: ./.github/workflows/tmpl-versioning.yml
    with:
      tag-prefix: 'rc-v'
      include-ci-suffix: false

  # ─────────────────────────────────────────────────────────────────────────────
  # 6. Deploy to QA  ← APPROVAL GATE
  #     Re-tags the Docker image from Test (dev-v) to QA (rc-v), then deploy — same pattern as Live.
  #     Add required reviewers: repo → Settings → Environments → qa
  # ─────────────────────────────────────────────────────────────────────────────
  deploy-qa:
    name: Deploy → QA [approval required]
    needs: [generate-test-version, generate-qa-version, tag-test]
    runs-on: ubuntu-latest
    environment: qa
    steps:
      - name: Re-tag Docker image with QA version
        run: |
          TEST_VERSION="${{ needs.generate-test-version.outputs.version }}"
          QA_VERSION="${{ needs.generate-qa-version.outputs.version }}"
          echo "${{ secrets.DOCKER_HUB_TOKEN }}" | \
            docker login -u "${{ secrets.DOCKER_HUB_USERNAME }}" --password-stdin
          docker pull ${{ vars.DOCKER_HUB_REPOSITORY }}:${TEST_VERSION}
          docker tag \
            ${{ vars.DOCKER_HUB_REPOSITORY }}:${TEST_VERSION} \
            ${{ vars.DOCKER_HUB_REPOSITORY }}:${QA_VERSION}
          docker push ${{ vars.DOCKER_HUB_REPOSITORY }}:${QA_VERSION}
          echo "::notice title=Docker QA Tag::${QA_VERSION}"

      - name: Deploy to QA
        run: |
          VERSION="${{ needs.generate-qa-version.outputs.version }}"
          IMAGE="${{ vars.DOCKER_HUB_REPOSITORY }}:${VERSION}"
          echo "::notice title=Deploying to QA::${IMAGE}"
          # ── Replace with your actual deployment commands ──
          echo "Deployed ${IMAGE} to QA ✓"

  # ─────────────────────────────────────────────────────────────────────────────
  # 7. Tag QA — only runs after deploy-qa succeeds
  # ─────────────────────────────────────────────────────────────────────────────
  tag-qa:
    name: Tag QA Build (rc-v)
    needs: [generate-qa-version, deploy-qa]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create and push QA git tag (rc-v)
        run: |
          VERSION="${{ needs.generate-qa-version.outputs.version }}"
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "${VERSION}" -m "QA ${VERSION}"
          git push origin "${VERSION}"
          echo "::notice title=QA Git Tag::${VERSION}"

  # ─────────────────────────────────────────────────────────────────────────────
  # 8. Generate Live-scoped version — only runs after QA tag is pushed
  #    Counts existing v{YYYY.MM}.* tags — isolated from QA (rc-v*) tags
  # ─────────────────────────────────────────────────────────────────────────────
  generate-live-version:
    name: Generate Live Version (v)
    needs: tag-qa
    uses: ./.github/workflows/tmpl-versioning.yml
    with:
      tag-prefix: 'v'
      include-ci-suffix: false

  # ─────────────────────────────────────────────────────────────────────────────
  # 9. Deploy to Live  ← APPROVAL GATE
  #     Re-tags the Docker image from rc-v to the clean Live version.
  #     Add required reviewers: repo → Settings → Environments → live
  # ─────────────────────────────────────────────────────────────────────────────
  deploy-live:
    name: Deploy → Live [approval required]
    needs: [generate-qa-version, generate-live-version]
    runs-on: ubuntu-latest
    environment: live
    steps:
      - name: Re-tag Docker image with Live version
        run: |
          QA_VERSION="${{ needs.generate-qa-version.outputs.version }}"
          LIVE_VERSION="${{ needs.generate-live-version.outputs.version }}"
          echo "${{ secrets.DOCKER_HUB_TOKEN }}" | \
            docker login -u "${{ secrets.DOCKER_HUB_USERNAME }}" --password-stdin
          docker pull ${{ vars.DOCKER_HUB_REPOSITORY }}:${QA_VERSION}
          docker tag \
            ${{ vars.DOCKER_HUB_REPOSITORY }}:${QA_VERSION} \
            ${{ vars.DOCKER_HUB_REPOSITORY }}:${LIVE_VERSION}
          docker push ${{ vars.DOCKER_HUB_REPOSITORY }}:${LIVE_VERSION}
          echo "::notice title=Docker Live Tag::${LIVE_VERSION}"

      - name: Deploy to Live
        run: |
          LIVE_VERSION="${{ needs.generate-live-version.outputs.version }}"
          IMAGE="${{ vars.DOCKER_HUB_REPOSITORY }}:${LIVE_VERSION}"
          echo "::notice title=Deploying to Live::${IMAGE}"
          # ── Replace with your actual deployment commands ──
          echo "Deployed ${IMAGE} to Live ✓"

  # ─────────────────────────────────────────────────────────────────────────────
  # 10. Tag Live — only runs after deploy-live succeeds
  # ─────────────────────────────────────────────────────────────────────────────
  tag-live:
    name: Tag Live Release (v)
    needs: [generate-live-version, deploy-live]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create and push Live git tag (v)
        run: |
          LIVE_VERSION="${{ needs.generate-live-version.outputs.version }}"
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "${LIVE_VERSION}" -m "Live ${LIVE_VERSION}"
          git push origin "${LIVE_VERSION}"
          echo "::notice title=Live Git Tag::${LIVE_VERSION}"
