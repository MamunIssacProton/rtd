# ═══════════════════════════════════════════════════════════════════════════════
# API — Release Pipeline (FIXED)
# ═══════════════════════════════════════════════════════════════════════════════
name: API — Release

on:
  workflow_dispatch:

jobs:
  npm-build:
    uses: ./.github/workflows/tmpl-npm-build.yml
    with:
      node-version: '22'
      working-directory: .

  npm-test:
    needs: npm-build
    uses: ./.github/workflows/tmpl-npm-test.yml
    with:
      node-version: '22'
      working-directory: .

  npm-coverage:
    needs: npm-build
    uses: ./.github/workflows/tmpl-npm-coverage.yml
    with:
      node-version: '22'
      working-directory: .
      coverage-artifact-name: coverage-release-${{ github.run_number }}

  generate-test-version:
    needs: [npm-test, npm-coverage]
    uses: ./.github/workflows/tmpl-versioning.yml
    with:
      tag-prefix: 'dev-v'
      include-ci-suffix: false

  docker-build-push-test:
    needs: generate-test-version
    uses: ./.github/workflows/tmpl-docker-build-push.yml
    with:
      node-version: '22'
      docker-tag: ${{ needs.generate-test-version.outputs.version }}
      docker-repository: ${{ vars.DOCKER_HUB_REPOSITORY }}
      dockerfile-path: Dockerfile
      context-path: .
    secrets:
      docker-username: ${{ secrets.DOCKER_HUB_USERNAME }}
      docker-password: ${{ secrets.DOCKER_HUB_TOKEN }}

  deploy-test:
    needs: [generate-test-version, docker-build-push-test]
    runs-on: ubuntu-latest
    environment: test
    steps:
      - run: |
          VERSION="${{ needs.generate-test-version.outputs.version }}"
          IMAGE="${{ vars.DOCKER_HUB_REPOSITORY }}:${VERSION}"
          echo "Deploying ${IMAGE} to Test"

  tag-test:
    needs: [generate-test-version, deploy-test]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - run: |
          VERSION="${{ needs.generate-test-version.outputs.version }}"
          git config user.name "github-actions[bot]"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "${VERSION}" -m "Test ${VERSION}"
          git push origin "${VERSION}"

  generate-qa-version:
    needs: tag-test
    uses: ./.github/workflows/tmpl-versioning.yml
    with:
      tag-prefix: 'rc-v'
      include-ci-suffix: false

  deploy-qa:
    needs: [generate-test-version, generate-qa-version]
    runs-on: ubuntu-latest
    environment: qa
    steps:
      - run: |
          TEST_VERSION="${{ needs.generate-test-version.outputs.version }}"
          QA_VERSION="${{ needs.generate-qa-version.outputs.version }}"
          echo "Retag ${TEST_VERSION} -> ${QA_VERSION}"

  tag-qa:
    needs: [generate-qa-version, deploy-qa]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - run: |
          VERSION="${{ needs.generate-qa-version.outputs.version }}"
          git config user.name "github-actions[bot]"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "${VERSION}" -m "QA ${VERSION}"
          git push origin "${VERSION}"

  generate-live-version:
    needs: tag-qa
    uses: ./.github/workflows/tmpl-versioning.yml
    with:
      tag-prefix: 'v'
      include-ci-suffix: false

  deploy-live:
    needs: [generate-qa-version, generate-live-version]
    runs-on: ubuntu-latest
    environment: live
    steps:
      - run: |
          QA_VERSION="${{ needs.generate-qa-version.outputs.version }}"
          LIVE_VERSION="${{ needs.generate-live-version.outputs.version }}"
          echo "Retag ${QA_VERSION} -> ${LIVE_VERSION}"

  tag-live:
    needs: [generate-live-version, deploy-live]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - run: |
          VERSION="${{ needs.generate-live-version.outputs.version }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "${VERSION}" -m "Live ${VERSION}"
          git push origin "${VERSION}"
          git tag "${VERSION}" -m "Live ${VERSION}"
          git push origin "${VERSION}"
