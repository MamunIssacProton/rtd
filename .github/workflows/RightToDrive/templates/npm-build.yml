# ─────────────────────────────────────────────────────────────────────────────
# Reusable Template — NPM Build
#
# Checks out code, installs dependencies (with cache), compiles TypeScript
# via `npm run build`, and uploads the compiled dist/ as a workflow artifact
# so downstream jobs can consume it without re-building.
#
# Required inputs:
#   node-version        — Node.js version to use  (e.g. "22")
#   working-directory   — path to the dir containing package.json
#
# Optional inputs:
#   artifact-name       — name for the uploaded dist artifact (default: dist)
#
# Outputs:
#   artifact-name       — echoes back the artifact name used
# ─────────────────────────────────────────────────────────────────────────────
name: Template — NPM Build

on:
  workflow_call:
    inputs:
      node-version:
        description: 'Node.js version (e.g. "22")'
        required: true
        type: string
      working-directory:
        description: "Relative path to the directory containing package.json"
        required: false
        type: string
        default: "."
      artifact-name:
        description: "Name for the uploaded dist artifact"
        required: false
        type: string
        default: "dist"
    outputs:
      artifact-name:
        description: "Name of the uploaded dist artifact"
        value: ${{ jobs.npm-build.outputs.artifact-name }}

jobs:
  npm-build:
    name: NPM Build (Node ${{ inputs.node-version }})
    runs-on: ubuntu-latest
    outputs:
      artifact-name: ${{ inputs.artifact-name }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js ${{ inputs.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}
          cache: npm
          cache-dependency-path: ${{ inputs.working-directory }}/package-lock.json

      - name: Install dependencies
        working-directory: ${{ inputs.working-directory }}
        run: npm ci

      - name: Build
        working-directory: ${{ inputs.working-directory }}
        run: npm run build

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.artifact-name }}
          path: ${{ inputs.working-directory }}/dist
          retention-days: 1
          if-no-files-found: error
