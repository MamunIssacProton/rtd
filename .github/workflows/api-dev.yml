# ═══════════════════════════════════════════════════════════════════════════════
# API — Dev Pipeline
#
# Triggered automatically on every push to the dev branch.
# Versioning is branch-scoped — tags use the "dev-v" prefix and are completely
# independent from release tags.
#
# Tag format:  dev-v{YYYY.MM}.{N}-ci.{YYYYMMDD}.{run}
# Example:     dev-v2026.04.3-ci.20260406.07
#
# Counter N resets every calendar month and only counts "dev-v" tags,
# so release tags never affect the dev counter (and vice-versa).
#
# GitHub secrets required:
#   DOCKER_HUB_USERNAME   Docker Hub username
#   DOCKER_HUB_TOKEN      Docker Hub access token
#
# GitHub variables required:
#   DOCKER_HUB_REPOSITORY  full repo slug  (e.g. myorg/right-to-drive-api)
#
# GitHub environments required (repo → Settings → Environments):
#   test  — no approval gates (auto-deploy)
# ═══════════════════════════════════════════════════════════════════════════════
name: API — Dev

on:
  workflow_dispatch:

# ═══════════════════════════════════════════════════════════════════════════════
jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # 1. Compile TypeScript
  # ─────────────────────────────────────────────────────────────────────────────
  npm-build:
    name: NPM Build
    uses: ./.github/workflows/tmpl-npm-build.yml
    with:
      node-version: '22'
      working-directory: .

  # ─────────────────────────────────────────────────────────────────────────────
  # 2. Unit tests  ┐
  # 3. Coverage    ┘  parallel — both must pass before version is generated
  # ─────────────────────────────────────────────────────────────────────────────
  npm-test:
    name: NPM Test
    needs: npm-build
    uses: ./.github/workflows/tmpl-npm-test.yml
    with:
      node-version: '22'
      working-directory: .

  npm-coverage:
    name: NPM Coverage
    needs: npm-build
    uses: ./.github/workflows/tmpl-npm-coverage.yml
    with:
      node-version: '22'
      working-directory: .
      coverage-artifact-name: coverage-dev-${{ github.run_number }}

  # ─────────────────────────────────────────────────────────────────────────────
  # 4. Generate dev-scoped version tag — only runs if build AND tests passed
  #    Counts existing dev-v{YYYY.MM}.* tags → patch counter N
  # ─────────────────────────────────────────────────────────────────────────────
  generate-version:
    name: Generate Dev Version
    needs: [npm-test, npm-coverage]
    uses: ./.github/workflows/tmpl-versioning.yml
    with:
      tag-prefix: 'dev-v'
      include-ci-suffix: true

  # ─────────────────────────────────────────────────────────────────────────────
  # 5. Docker build + push  (tagged with the generated dev version)
  # ─────────────────────────────────────────────────────────────────────────────
  docker-build-push:
    name: Docker Build & Push
    needs: generate-version
    uses: ./.github/workflows/tmpl-docker-build-push.yml
    with:
      node-version: '22'
      docker-tag: ${{ needs.generate-version.outputs.version }}
      docker-repository: ${{ vars.DOCKER_HUB_REPOSITORY }}
      dockerfile-path: Dockerfile
      context-path: .
    secrets:
      docker-username: ${{ secrets.DOCKER_HUB_USERNAME }}
      docker-password: ${{ secrets.DOCKER_HUB_TOKEN }}

  # ─────────────────────────────────────────────────────────────────────────────
  # 6. Deploy to Test (auto)
  # ─────────────────────────────────────────────────────────────────────────────
  deploy-test:
    name: Deploy → Test (auto)
    needs: [generate-version, docker-build-push]
    runs-on: ubuntu-latest
    environment: test
    steps:
      - name: Deploy to Test environment
        run: |
          VERSION="${{ needs.generate-version.outputs.version }}"
          IMAGE="${{ vars.DOCKER_HUB_REPOSITORY }}:${VERSION}"
          echo "::notice title=Deploying to Test::${IMAGE}"
          # ── Replace with your actual deployment commands ──
          echo "Deployed ${IMAGE} to Test ✓"

  # ─────────────────────────────────────────────────────────────────────────────
  # 7. Tag — only runs after deploy-test succeeds
  # ─────────────────────────────────────────────────────────────────────────────
  tag-dev:
    name: Tag Dev Build
    needs: [generate-version, deploy-test]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create and push dev git tag
        run: |
          VERSION="${{ needs.generate-version.outputs.version }}"
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "${VERSION}" -m "Dev build ${VERSION}"
          git push origin "${VERSION}"
          echo "::notice title=Git Tag Created::${VERSION}"
